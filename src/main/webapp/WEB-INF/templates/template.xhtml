<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>UTN GolMundial 2026 — Admin</title>
        <h:outputStylesheet library="css" name="admin.css"/>
    </h:head>
    <h:body>
        <div class="layout-wrapper">
            <!-- SIDEBAR -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2> UTN Admin</h2>
                    <p>GolMundial 2026</p>
                    <p style="color:#4fc3f7; font-size:12px; margin-top:4px;">
                        👤 #{loginBean.nombreUsuario}
                    </p>
                </div>
                <nav class="sidebar-nav">
                    <h:link outcome="/index" styleClass="nav-item">🏠 Dashboard</h:link>
                    <h:link outcome="/selecciones" styleClass="nav-item">🏳 Selecciones</h:link>
                    <h:link outcome="/sedes" styleClass="nav-item">🏟 Sedes</h:link>
                    <h:link outcome="/partidos" styleClass="nav-item">📅 Partidos</h:link>
                    <h:link outcome="/usuarios" styleClass="nav-item">👥 Usuarios</h:link>
                    <h:link outcome="/auditoria" styleClass="nav-item">📋 Auditoría</h:link>
                    <h:link outcome="/reportes" styleClass="nav-item">📊 Reportes</h:link>
                    <h:form style="padding: 12px 20px;">
                        <p:commandButton value="Cerrar Sesión" action="#{loginBean.logout}"
                                         ajax="false" style="width:100%; background:#CC0000; border:none;
                                         color:#fff; padding:8px; border-radius:6px; cursor:pointer;"/>
                    </h:form>
                </nav>
            </div>
            <!-- CONTENIDO -->
            <div class="main-content">
                <div class="topbar">
                    <h3><ui:insert name="titulo">Panel Admin</ui:insert></h3>
                </div>
                <div class="content-area">
                    <p:messages showDetail="true" closable="true"/>
                    <ui:insert name="contenido"/>
                </div>
            </div>
        </div>
    </h:body>
</html>
