<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">
    <ui:composition template="/WEB-INF/templates/template.xhtml">
        <ui:define name="titulo">Gestión de Partidos</ui:define>
        <ui:define name="contenido">

            <div class="card">
                <h4>Nuevo Partido</h4>
                <h:form>
                    <p:panelGrid columns="4" style="margin-bottom:10px">
                        <p:outputLabel value="Selección Local:"/>
                        <p:selectOneMenu value="#{partidoBean.partido.seleccionLocalId}" required="true">
                            <f:selectItem itemLabel="-- Seleccionar --" itemValue="0"/>
                            <f:selectItems value="#{partidoBean.selecciones}" var="s"
                                           itemLabel="#{s.nombre}" itemValue="#{s.id}"/>
                        </p:selectOneMenu>
                        <p:outputLabel value="Selección Visitante:"/>
                        <p:selectOneMenu value="#{partidoBean.partido.seleccionVisitanteId}" required="true">
                            <f:selectItem itemLabel="-- Seleccionar --" itemValue="0"/>
                            <f:selectItems value="#{partidoBean.selecciones}" var="s"
                                           itemLabel="#{s.nombre}" itemValue="#{s.id}"/>
                        </p:selectOneMenu>
                        <p:outputLabel value="Sede:"/>
                        <p:selectOneMenu value="#{partidoBean.partido.sedeId}" required="true">
                            <f:selectItem itemLabel="-- Seleccionar --" itemValue="0"/>
                            <f:selectItems value="#{partidoBean.sedes}" var="s"
                                           itemLabel="#{s.nombre}" itemValue="#{s.id}"/>
                        </p:selectOneMenu>
                        <p:outputLabel value="Fecha y Hora (hora Ecuador):"/>
                        <p:calendar value="#{partidoBean.fechaHoraDate}" pattern="yyyy-MM-dd HH:mm"
                                    timeZone="America/Guayaquil" navigator="true"
                                    placeholder="Selecciona fecha y hora"/>
                        <p:outputLabel value="Fase:"/>
                        <p:inputText value="#{partidoBean.partido.fase}" placeholder="Grupos"/>
                        <p:outputLabel value="Grupo:"/>
                        <p:inputText value="#{partidoBean.partido.grupo}" placeholder="A"/>
                    </p:panelGrid>
                    <p:commandButton value="Guardar Partido" action="#{partidoBean.guardar}"
                                     update="@form :tablaPartidos" icon="pi pi-save" styleClass="ui-button-success"/>
                </h:form>
            </div>

            <div class="card">
                <h4>Listado de Partidos</h4>
                <h:form id="tablaPartidos">
                    <p:dataTable value="#{partidoBean.partidos}" var="p"
                                 paginator="true" rows="10" stripedRows="true"
                                 emptyMessage="No hay partidos registrados.">
                        <p:column headerText="ID"><h:outputText value="#{p.id}"/></p:column>
                        <p:column headerText="Local"><h:outputText value="#{p.seleccionLocal.nombre}"/></p:column>
                        <p:column headerText="Visitante"><h:outputText value="#{p.seleccionVisitante.nombre}"/></p:column>
                        <p:column headerText="Sede"><h:outputText value="#{p.sede.nombre}"/></p:column>
                        <p:column headerText="Fecha"><h:outputText value="#{p.fechaHora}"/></p:column>
                        <p:column headerText="Fase"><h:outputText value="#{p.fase}"/></p:column>
                        <p:column headerText="Estado"><h:outputText value="#{p.estado}"/></p:column>
                        <p:column headerText="Marcador">
                            <h:outputText value="#{p.golesLocal} - #{p.golesVisitante}"
                                          rendered="#{p.estado == 'finalizado'}"/>
                            <h:outputText value="—" rendered="#{p.estado != 'finalizado'}"/>
                        </p:column>
                        <p:column headerText="Resultado">
                            <p:commandButton value="Registrar" icon="pi pi-pencil"
                                             rendered="#{p.estado != 'finalizado'}"
                                             actionListener="#{partidoBean.prepararResultado(p)}"
                                             update=":formResultado" oncomplete="PF('dlgResultado').show()"/>
                        </p:column>
                        <p:column headerText="Cambiar Estado">
                            <p:commandButton value="Editar Estado" icon="pi pi-refresh"
                                             actionListener="#{partidoBean.prepararEstado(p)}"
                                             update=":formEstado" oncomplete="PF('dlgEstado').show()"/>
                        </p:column>
                    </p:dataTable>
                </h:form>

                <h:form id="formResultado">
                    <p:dialog header="Registrar Resultado" widgetVar="dlgResultado" modal="true" width="400">
                        <p:panelGrid columns="2" style="margin-bottom:10px">
                            <p:outputLabel value="Goles Local:"/>
                            <p:inputNumber value="#{partidoBean.golesLocal}" minValue="0"/>
                            <p:outputLabel value="Goles Visitante:"/>
                            <p:inputNumber value="#{partidoBean.golesVisitante}" minValue="0"/>
                        </p:panelGrid>
                        <p:commandButton value="Confirmar" action="#{partidoBean.registrarResultado}"
                                         update=":tablaPartidos" oncomplete="PF('dlgResultado').hide()"
                                         icon="pi pi-check" styleClass="ui-button-success"/>
                    </p:dialog>
                </h:form>
                <h:form id="formEstado">
                    <p:dialog header="Cambiar Estado del Partido" widgetVar="dlgEstado" modal="true" width="400">
                        <p:panelGrid columns="2" style="margin-bottom:10px">
                            <p:outputLabel value="Nuevo Estado:"/>
                            <p:selectOneMenu value="#{partidoBean.nuevoEstado}">
                                <f:selectItem itemLabel="programado" itemValue="programado"/>
                                <f:selectItem itemLabel="finalizado" itemValue="finalizado"/>
                            </p:selectOneMenu>
                        </p:panelGrid>
                        <p:commandButton value="Confirmar" action="#{partidoBean.actualizarEstado}"
                                         update=":tablaPartidos" oncomplete="PF('dlgEstado').hide()"
                                         icon="pi pi-check" styleClass="ui-button-success"/>
                    </p:dialog>
                </h:form>
            </div>

        </ui:define>
    </ui:composition>
</html>
