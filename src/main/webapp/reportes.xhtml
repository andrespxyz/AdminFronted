<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
    <ui:composition template="/WEB-INF/templates/template.xhtml">
        <ui:define name="titulo">Reportes</ui:define>
        <ui:define name="contenido">

            <div class="stats-grid" style="grid-template-columns: repeat(1, 1fr); max-width: 320px;">
                <div class="stat-card">
                    <div class="number">#{reportesBean.totalCirculacion}</div>
                    <div class="label">UTNGolCoin en circulación</div>
                </div>
            </div>

            <div class="card">
                <h4>Partidos con más predicciones</h4>
                <h:form id="tablaReporte">
                    <p:dataTable value="#{reportesBean.partidosMasPredicciones}" var="r"
                                 paginator="true" rows="10" stripedRows="true"
                                 emptyMessage="Aún no hay predicciones registradas.">
                        <p:column headerText="ID del Partido"><h:outputText value="#{r.partidoId}"/></p:column>
                        <p:column headerText="Cantidad de Predicciones"><h:outputText value="#{r.cantidadPredicciones}"/></p:column>
                    </p:dataTable>
                </h:form>
            </div>

        </ui:define>
    </ui:composition>
</html>
