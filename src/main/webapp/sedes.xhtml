<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
    <ui:composition template="/WEB-INF/templates/template.xhtml"
                    xmlns:f="jakarta.faces.core">
        <ui:define name="titulo">Gestión de Sedes</ui:define>
        <ui:define name="contenido">

            <div class="card">
                <h4>Nueva Sede</h4>
                <h:form>
                    <p:panelGrid columns="4" style="margin-bottom:10px">
                        <p:outputLabel value="Nombre:"/>
                        <p:inputText value="#{sedeBean.sede.nombre}" required="true"/>
                        <p:outputLabel value="Ciudad:"/>
                        <p:inputText value="#{sedeBean.sede.ciudad}" required="true"/>
                        <p:outputLabel value="País:"/>
                        <p:inputText value="#{sedeBean.sede.pais}" required="true"/>
                        <p:outputLabel value="Capacidad:"/>
                        <p:inputNumber value="#{sedeBean.sede.capacidad}" required="true"/>
                    </p:panelGrid>
                    <p:commandButton value="Guardar" action="#{sedeBean.guardar}"
                                     update="@form :tablaSedes" icon="pi pi-save" styleClass="ui-button-success"/>
                </h:form>
            </div>

            <div class="card">
                <h4>Listado de Sedes</h4>
                <h:form id="tablaSedes">
                    <p:dataTable value="#{sedeBean.sedes}" var="s"
                                 paginator="true" rows="10" stripedRows="true"
                                 emptyMessage="No hay sedes registradas.">
                        <p:column headerText="ID"><h:outputText value="#{s.id}"/></p:column>
                        <p:column headerText="Nombre"><h:outputText value="#{s.nombre}"/></p:column>
                        <p:column headerText="Ciudad"><h:outputText value="#{s.ciudad}"/></p:column>
                        <p:column headerText="País"><h:outputText value="#{s.pais}"/></p:column>
                        <p:column headerText="Capacidad"><h:outputText value="#{s.capacidad}"/></p:column>
                        <p:column headerText="Acciones">
                            <p:commandButton value="Eliminar" icon="pi pi-trash" styleClass="ui-button-danger"
                                             actionListener="#{sedeBean.eliminar(s)}" update=":tablaSedes"
                                             process="@this">
                                <p:confirm header="Confirmar" message="¿Eliminar esta sede? Esta acción no se puede deshacer."
                                           icon="pi pi-exclamation-triangle"/>
                            </p:commandButton>
                            <p:commandButton value="Editar" icon="pi pi-pencil"
                                             actionListener="#{sedeBean.prepararEditar(s)}"
                                             update=":formEditarSede" oncomplete="PF('dlgEditarSede').show()"/>
                        </p:column>
                    </p:dataTable>
                </h:form>

                <h:form id="formEditarSede">
                    <p:dialog header="Editar Sede" widgetVar="dlgEditarSede" modal="true" width="400">
                        <p:panelGrid columns="2" style="margin-bottom:10px" rendered="#{sedeBean.sedeEditar != null}">
                            <p:outputLabel value="Nombre:"/>
                            <p:inputText value="#{sedeBean.sedeEditar.nombre}" required="true"/>
                            <p:outputLabel value="Ciudad:"/>
                            <p:inputText value="#{sedeBean.sedeEditar.ciudad}" required="true"/>
                            <p:outputLabel value="País:"/>
                            <p:inputText value="#{sedeBean.sedeEditar.pais}" required="true"/>
                            <p:outputLabel value="Capacidad:"/>
                            <p:inputNumber value="#{sedeBean.sedeEditar.capacidad}" required="true"/>
                        </p:panelGrid>
                        <p:commandButton value="Confirmar" action="#{sedeBean.actualizar}"
                                         update=":tablaSedes" oncomplete="PF('dlgEditarSede').hide()"
                                         icon="pi pi-check" styleClass="ui-button-success"/>
                    </p:dialog>
                </h:form>
            </div>

        </ui:define>
    </ui:composition>
</html>
