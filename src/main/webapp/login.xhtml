<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>UTN Admin — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #1a1a2e;
               display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: #fff; border-radius: 12px; padding: 48px;
                      width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-card h2 { color: #1a1a2e; font-size: 24px; margin-bottom: 8px; text-align: center; }
        .login-card p { color: #666; font-size: 13px; text-align: center; margin-bottom: 32px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #333; font-size: 13px;
                            font-weight: 600; margin-bottom: 6px; }
        .ui-inputtext { width: 100% !important; padding: 10px 14px !important;
                        border: 1px solid #ddd !important; border-radius: 8px !important; }
        .btn-login { width: 100%; padding: 12px; background: #1a1a2e;
                     color: #fff; border: none; border-radius: 8px;
                     font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .btn-login:hover { background: #2d2d4e; }
        .logo { text-align: center; font-size: 48px; margin-bottom: 16px; }
    </style>
</h:head>
<h:body>
    <div class="login-card">
        <div class="logo">⚽</div>
        <h2>UTN GolMundial Admin</h2>
        <p>Panel de administración del torneo</p>

        <h:form>
            <p:messages showDetail="true" closable="true"/>
            <div class="form-group">
                <label>Email</label>
                <p:inputText value="#{loginBean.email}" placeholder="admin@utn.edu.ec" style="width:100%"/>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <p:password value="#{loginBean.password}" placeholder="••••••••" style="width:100%" feedback="false"/>
            </div>
            <p:commandButton value="Iniciar Sesión" action="#{loginBean.login}"
                             styleClass="btn-login" ajax="false"/>
        </h:form>
    </div>
</h:body>
</html>
